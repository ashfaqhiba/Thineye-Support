<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - Thin Eye</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }

    body {
      background:#ffffff;
      color:#000000;
      line-height:1.6;
    }

    .container {
      max-width:600px;
      margin:0 auto;
      padding:60px 20px;
    }

    h1 {
      font-size:36px;
      margin-bottom:10px;
    }

    .subtitle {
      color:#666;
      margin-bottom:40px;
    }

    form {
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    input, textarea {
      width:100%;
      padding:14px;
      border:1px solid #ddd;
      font-size:16px;
      border-radius:8px;
      outline:none;
      transition:0.2s;
    }

    input:focus, textarea:focus {
      border-color:#000;
    }

    textarea {
      min-height:120px;
      resize:vertical;
    }

    button {
      padding:14px;
      background:#000;
      color:#fff;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover {
      opacity:0.85;
    }

    .footer {
      margin-top:60px;
      text-align:center;
      font-size:14px;
      color:#888;
    }

    .note {
      margin-top:20px;
      font-size:14px;
      color:#666;
      text-align:center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Support</h1>
    <div class="subtitle">We’re here to help. Send us a message and we’ll get back to you.</div>

    <form action="mailto:support@thineye.app" method="POST" enctype="text/plain">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>

    <div class="note">
      Or email us directly at support@thineye.app
    </div>

    <div class="footer">© 2026 Thin Eye</div>
  </div>

</body>
</html>
